name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: syntax + import check (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: set up python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: byte-compile all .py
        run: python -m compileall -q kata.py bench_data.py plot.py weatherman.py compare.py sysinfo.py prompts/

      - name: import smoke check
        run: |
          python -c "import bench_data, plot, sysinfo, compare"
          python -c "import kata" || echo "kata.py is a script; skipped"
          python -c "import weatherman" || echo "weatherman.py is a script; skipped"

      - name: yaml configs parse
        run: |
          python -c "
          import yaml, pathlib
          for p in pathlib.Path('configs').glob('*.yaml'):
              yaml.safe_load(p.read_text())
              print(f'ok: {p}')
          "
